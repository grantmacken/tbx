name: worktree tbx-build-tools
on:
  #schedule:
  # - cron: '0 1 * * 1'  #  1am every monday
  push:
    branches:
    - tbx-build-tools
    paths-ignore:
    - '**/README.md'
jobs:
  build_tools_toolbox:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    # https://docs.github.com/en/actions/reference/authentication-in-a-workflow
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
        - uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ github.token }}
        - uses: actions/checkout@v4
          with:
            token: ${{ github.token }}
        - uses: actions/checkout@v4
        - name: Toolbox Build
          run: |
            make .env
            make
            make README.md
        - name: Commit and push README.md changes
          run: |
            git add README.md
            git commit -m "Update README.md from Makefile build" README.md
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
